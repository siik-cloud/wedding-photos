# supabase/config.toml
# Supabase CLI configuration for the wedding-photos project.
#
# Full option reference:
#   https://supabase.com/docs/reference/cli/config
#
# After cloning this repo:
#   1. Install CLI:  npm install -g supabase
#   2. Link remote:  supabase link --project-ref <your-project-ref>
#   3. Push schema:  supabase db push

project_id = "wedding-photos"

# ── Database ────────────────────────────────────────────────────────────────
[db]
port         = 54322
shadow_port  = 54320
# Must match your remote Postgres major version.
# Check with: SELECT version(); on the remote DB.
major_version = 15

# ── REST API ─────────────────────────────────────────────────────────────────
[api]
enabled          = true
port             = 54321
schemas          = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows         = 1000

# ── Local Studio (dashboard) ─────────────────────────────────────────────────
[studio]
enabled = true
port    = 54323

# ── Storage ──────────────────────────────────────────────────────────────────
[storage]
enabled         = true
# Must be at least as large as the max video size accepted by the upload API.
file_size_limit = "260MiB"

# ── Auth ─────────────────────────────────────────────────────────────────────
# We do not use Supabase Auth — admin sessions are HMAC-signed cookies.
# Enabled here so the local stack starts without errors.
[auth]
enabled  = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry                    = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval  = 10
enable_signup                 = false

[auth.email]
enable_signup         = false
double_confirm_changes = true
enable_confirmations  = false

# ── Analytics (disable to keep local stack lightweight) ──────────────────────
[analytics]
enabled = false
